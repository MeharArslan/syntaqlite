# @generated by syntaqlite-buildtools — DO NOT EDIT

[package]
name = "syntaqlite"
version = "0.1.0"
edition = "2024"

[features]
default = ["sqlite", "fmt", "validation"]
fmt = []                     # formatter (bytecode interpreter)
validation = []              # semantic validation (schema checks, fuzzy suggestions)
embedded = ["validation"]    # embedded SQL extraction from host languages (Python f-strings, etc.)
lsp = ["fmt", "validation", "dep:lsp-server", "dep:lsp-types", "dep:serde_json"]  # LSP analysis host + protocol server
sqlite = ["syntaqlite-syntax/sqlite"]  # SQLite dialect (grammar, tokens, cflags, functions)
json = ["dep:serde", "dep:serde_json"]   # JSON serialization for diagnostics and related types

# Pin version/cflags at compile time for dead-code elimination.
# Values come from env vars, using the same names as the C defines:
#
#   SYNTAQLITE_SQLITE_VERSION=3035000 cargo build --features pin-version
#
#   SYNTAQLITE_CFLAG_SQLITE_OMIT_WINDOWFUNC=1 \
#   SYNTAQLITE_CFLAG_SQLITE_ENABLE_FTS5=1 \
#   cargo build --features pin-cflags
#
pin-version = ["sqlite", "syntaqlite-syntax/pin-version"]   # Pin SQLite version via SYNTAQLITE_SQLITE_VERSION env var
pin-cflags = ["sqlite", "syntaqlite-syntax/pin-cflags"]    # Pin compile-time flags via SYNTAQLITE_CFLAG_* env vars

[lints]
workspace = true

[dependencies]
syntaqlite-common = { path = "../syntaqlite-common" }
syntaqlite-syntax = { path = "../syntaqlite-syntax", default-features = false }
serde = { version = "1", features = ["derive"], optional = true }
serde_json = { version = "1", optional = true }
lsp-server = { version = "0.7", optional = true }
lsp-types = { version = "0.97", optional = true }
