[package]
name = "syntaqlite-cli"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "syntaqlite"
path = "src/main.rs"

[features]
default = ["builtin-sqlite", "codegen-dialect"]
builtin-sqlite = ["dep:syntaqlite", "syntaqlite/sqlite", "syntaqlite/lsp"]
codegen-dialect = ["dep:syntaqlite-buildtools", "syntaqlite-buildtools/codegen-pipeline"]
codegen-sqlite = ["dep:syntaqlite-buildtools", "syntaqlite-buildtools/sqlite-codegen"]
sqlite-extract = ["dep:syntaqlite-buildtools", "syntaqlite-buildtools/sqlite-extract"]
version-analysis = ["dep:syntaqlite-buildtools", "syntaqlite-buildtools/version-analysis"]

[dependencies]
clap = { version = "4.5", features = ["derive"] }
glob = "0.3"
libloading = "0.8"
lsp-server = "0.7"
lsp-types = "0.97"
serde_json = "1"
syntaqlite = { path = "../syntaqlite", optional = true, features = ["fmt", "lsp"] }
syntaqlite-buildtools = { path = "../syntaqlite-buildtools", optional = true, default-features = false }
tempfile = "3.8"
