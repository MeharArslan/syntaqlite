[package]
name = "syntaqlite-cli"
version = "0.1.0"
edition = "2024"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
glob = "0.3"
libloading = "0.8"
syntaqlite = { path = "../syntaqlite" }
syntaqlite-codegen = { path = "../syntaqlite-codegen" }
syntaqlite-runtime = { path = "../syntaqlite-runtime", features = ["fmt"] }
tempfile = "3.8"
