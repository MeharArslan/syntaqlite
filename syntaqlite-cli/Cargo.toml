[package]
name = "syntaqlite-cli"
version = "0.1.0"
edition = "2024"
repository.workspace = true
description = "Fast, accurate SQLite SQL formatter and parser"
homepage = "https://github.com/LalitMaganti/syntaqlite"

[[bin]]
name = "syntaqlite"
path = "src/main.rs"
doc = false

[features]
default = ["builtin-sqlite"]
builtin-sqlite = ["dep:syntaqlite", "dep:libloading", "dep:glob", "syntaqlite/sqlite", "syntaqlite/lsp", "syntaqlite/embedded", "dep:syntaqlite-buildtools"]

[dependencies]
clap = { version = "4.5", features = ["derive"] }
glob = { version = "0.3", optional = true }
libloading = { version = "0.8", optional = true }
serde_json = "1"
syntaqlite = { path = "../syntaqlite", optional = true, features = ["fmt", "lsp"] }
syntaqlite-parser = { path = "../syntaqlite-parser" }
syntaqlite-buildtools = { path = "../syntaqlite-buildtools", optional = true }
tempfile = "3.8"
