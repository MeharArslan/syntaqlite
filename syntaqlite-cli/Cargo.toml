[package]
name = "syntaqlite-cli"
version = "0.0.3"
edition = "2024"
repository.workspace = true
description = "Fast, accurate SQLite SQL formatter and parser"
homepage = "https://github.com/LalitMaganti/syntaqlite"

[lints]
workspace = true

[[bin]]
name = "syntaqlite"
path = "src/main.rs"
doc = false

[features]
default = ["builtin-sqlite"]
builtin-sqlite = ["dep:syntaqlite", "dep:glob", "syntaqlite/lsp", "syntaqlite/dynload", "syntaqlite/experimental-embedded", "dep:syntaqlite-buildtools"]

[dependencies]
clap = { version = "4.5", features = ["derive"] }
glob = { version = "0.3", optional = true }
serde_json = "1"
syntaqlite = { path = "../syntaqlite", optional = true, features = ["fmt", "lsp", "validation", "experimental-embedded", "serde-json"] }
syntaqlite-syntax = { path = "../syntaqlite-syntax" }
syntaqlite-buildtools = { path = "../syntaqlite-buildtools", optional = true }
tempfile = "3.8"
