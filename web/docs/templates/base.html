<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ config.title }}{% endblock title %}</title>
  <link rel="icon" type="image/svg+xml" href="{{ get_url(path='favicon.svg') }}">
  <link rel="stylesheet" href="{{ get_url(path='style.css') }}">
  <script>
    (function() {
      var theme = localStorage.getItem('sq-docs-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>
  <header>
    <nav>
      <a href="{{ config.base_url }}" class="site-title"><img src="{{ get_url(path='favicon.svg') }}" width="22" height="22" alt="" style="vertical-align: -3px; margin-right: 6px;">syntaqlite</a>
      <ul>
        <li><a href="{{ get_url(path='getting-started') }}">Getting started</a></li>
        <li><a href="{{ get_url(path='guides') }}">Guides</a></li>
        <li><a href="{{ get_url(path='concepts') }}">Concepts</a></li>
        <li><a href="{{ get_url(path='integrating') }}">Integrating</a></li>
        <li><a href="{{ get_url(path='contributing') }}">Contributing</a></li>
        <li><a href="{{ get_url(path='reference') }}">Reference</a></li>
      </ul>
      <div class="version-switcher">
        <button class="version-switcher__btn" id="version-btn">
          <span id="version-label">main</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="version-switcher__menu" id="version-menu"></div>
      </div>
      <div class="nav-icons">
        <a href="https://playground.syntaqlite.com" class="nav-icon nav-icon--labeled" title="Playground">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          <span>Playground</span>
        </a>
        <a href="https://github.com/LalitMaganti/syntaqlite" class="nav-icon" title="GitHub">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
        </a>
        <button class="nav-icon theme-toggle" title="Toggle theme" onclick="toggleTheme()">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        </button>
      </div>
    </nav>
  </header>

  <div class="layout">
    {% block sidebar %}{% endblock sidebar %}
    <main>
      {% block content %}{% endblock content %}
    </main>
  </div>

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({
      startOnLoad: true,
      theme: document.documentElement.getAttribute('data-theme') === 'light' ? 'default' : 'dark',
    });
  </script>
  <script>
    function switchTab(group, tab) {
      var g = document.querySelector('[data-tab-group="' + group + '"]');
      if (!g) return;
      g.querySelectorAll('.tab-buttons button').forEach(function(b) {
        b.classList.toggle('active', b.getAttribute('data-tab') === tab);
      });
      g.querySelectorAll('.tab-panel').forEach(function(p) {
        p.classList.toggle('active', p.getAttribute('data-tab') === tab);
      });
    }
    // Version switcher
    (function() {
      var btn = document.getElementById('version-btn');
      var menu = document.getElementById('version-menu');
      var label = document.getElementById('version-label');
      if (!btn || !menu || !label) return;

      // Detect current version from URL path
      var match = window.location.pathname.match(/^\/(main|v[^/]+)\//);
      var current = match ? match[1] : 'main';
      label.textContent = current;

      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        menu.classList.toggle('open');
      });

      document.addEventListener('click', function() {
        menu.classList.remove('open');
      });

      fetch('/versions.json')
        .then(function(r) { return r.json(); })
        .then(function(versions) {
          menu.innerHTML = '';
          versions.forEach(function(v) {
            var a = document.createElement('a');
            a.href = v.path;
            a.textContent = v.label;
            if (v.version === current) a.classList.add('active');
            menu.appendChild(a);
          });
        })
        .catch(function() {});
    })();

    function toggleTheme() {
      var current = document.documentElement.getAttribute('data-theme') || 'dark';
      var next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('sq-docs-theme', next);
    }
  </script>
</body>
</html>
