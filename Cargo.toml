# Cargo.toml
[workspace]
members = [
    "syntaqlite-common",
    "syntaqlite",
    "syntaqlite-parser",
    "syntaqlite-parser-sqlite",
    "syntaqlite-wasm",
    "syntaqlite-buildtools",
    "syntaqlite-cli",
    "benches",
]
resolver = "3"

[workspace.package]
repository = "https://github.com/LalitMaganti/syntaqlite"

[profile.dev]
opt-level = 1

# The profile that 'dist' will build with
[profile.dist]
inherits = "release"
lto = "thin"
