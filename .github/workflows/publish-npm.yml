# Publish syntaqlite to npm on release tags.
#
# Uses npm trusted publishing (OIDC) — no NPM_TOKEN needed.
# Configure at https://www.npmjs.com/package/syntaqlite/access
# with: Owner: LalitMaganti, Repo: syntaqlite, Workflow: publish-npm.yml
#
# NOTE: Initial publish requires a token. After first publish,
# configure trusted publishing and remove the token.
name: Publish npm

on:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: web/syntaqlite-js
        run: npm ci

      - name: Build
        working-directory: web/syntaqlite-js
        run: npm run build

      - name: Publish
        working-directory: web/syntaqlite-js
        run: npm publish --access public
