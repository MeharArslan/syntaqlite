# Build platform-specific .vsix packages with bundled syntaqlite binaries.
#
# On release tags: downloads pre-built CLI binaries from the Release workflow.
# On manual dispatch: builds CLI from source.
name: VS Code Extension

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-vsix:
    name: Package ${{ matrix.vscode-target }}
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - vscode-target: darwin-arm64
            rust-target: aarch64-apple-darwin
            build-name: macos-arm64
            runner: macos-14
            binary: syntaqlite
          - vscode-target: darwin-x64
            rust-target: x86_64-apple-darwin
            build-name: macos-x64
            runner: macos-14
            binary: syntaqlite
          - vscode-target: linux-x64
            rust-target: x86_64-unknown-linux-gnu
            build-name: linux-x64
            runner: ubuntu-latest
            binary: syntaqlite
          - vscode-target: linux-arm64
            rust-target: aarch64-unknown-linux-gnu
            build-name: linux-arm64
            runner: ubuntu-latest
            binary: syntaqlite
          - vscode-target: win32-x64
            rust-target: x86_64-pc-windows-msvc
            build-name: windows-x64
            runner: windows-latest
            binary: syntaqlite.exe

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      # -- Get CLI binary: download from Release workflow or build from source --
      - name: Download CLI from Release workflow
        if: github.event_name != 'workflow_dispatch'
        uses: actions/download-artifact@v7
        with:
          name: cli-${{ matrix.build-name }}
          path: archives/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract CLI binary (from Release)
        if: github.event_name != 'workflow_dispatch'
        shell: bash
        run: |
          mkdir -p target/${{ matrix.rust-target }}/release/
          ARCHIVE=$(find archives/ -name "syntaqlite-${{ matrix.build-name }}.*" | head -1)
          echo "Found archive: $ARCHIVE"
          if [[ "$ARCHIVE" == *.zip ]]; then
            unzip "$ARCHIVE" -d target/${{ matrix.rust-target }}/release/
          else
            tar -xf "$ARCHIVE" -C target/${{ matrix.rust-target }}/release/
          fi
          chmod +x target/${{ matrix.rust-target }}/release/${{ matrix.binary }}

      - name: Build CLI from source (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          # Install cross-compilation targets if needed
          case "${{ matrix.rust-target }}" in
            x86_64-apple-darwin)
              rustup target add x86_64-apple-darwin ;;
            aarch64-unknown-linux-gnu)
              rustup target add aarch64-unknown-linux-gnu
              sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
              echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
              echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml ;;
          esac
          cargo build --release -p syntaqlite-cli --target ${{ matrix.rust-target }}

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install extension dependencies
        working-directory: integrations/vscode
        run: npm ci

      - name: Compile extension
        working-directory: integrations/vscode
        run: npm run compile

      - name: Package .vsix
        working-directory: integrations/vscode
        run: node scripts/package-target.mjs --target ${{ matrix.vscode-target }} --binary ../../target/${{ matrix.rust-target }}/release/${{ matrix.binary }}

      - name: Upload .vsix
        uses: actions/upload-artifact@v6
        with:
          name: vsix-${{ matrix.vscode-target }}
          path: integrations/vscode/*.vsix
          retention-days: 30

  publish:
    name: Publish extension
    needs: build-vsix
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Download all .vsix artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: vsix-*
          path: vsix/
          merge-multiple: true

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install publishing tools
        run: npm install -g @vscode/vsce ovsx

      - name: Publish to VS Code Marketplace
        run: |
          for f in vsix/*.vsix; do
            vsce publish --packagePath "$f"
          done
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        run: |
          for f in vsix/*.vsix; do
            ovsx publish --packagePath "$f"
          done
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
