name: Deploy Playground

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: python3 tools/install-build-deps --rust --ui

      - name: Build WASM modules
        run: python3 tools/build-web-playground

      - name: Build @syntaqlite/js
        working-directory: web/syntaqlite-js
        run: |
          export PATH="$PWD/../../third_party/bin/linux-amd64/nodejs/bin:$PATH"
          npm install
          npx tsc

      - name: Install npm dependencies
        working-directory: web/playground
        run: |
          export PATH="$PWD/../../third_party/bin/linux-amd64/nodejs/bin:$PATH"
          npm install

      - name: Build frontend
        working-directory: web/playground
        run: |
          export PATH="$PWD/../../third_party/bin/linux-amd64/nodejs/bin:$PATH"
          npx tsc --noEmit
          npx vite build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/playground/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
