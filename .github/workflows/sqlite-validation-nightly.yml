# Nightly: run upstream SQLite validation tests daily in post-submit.
name: SQLite Validation (Nightly)

on:
  schedule:
    # Run daily at 06:00 UTC (post-submit, after typical work hours).
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual triggers.

jobs:
  upstream-sqlite-validation:
    name: Upstream SQLite validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache third_party
        uses: actions/cache@v4
        with:
          path: third_party
          key: third-party-${{ runner.os }}-${{ hashFiles('python/tools/install_build_deps.py') }}

      - name: Install build dependencies
        run: python3 tools/install-build-deps

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: cargo-nightly-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-nightly-${{ runner.os }}-

      - name: Build CLI
        run: tools/cargo build -p syntaqlite-cli

      - name: Run upstream SQLite validation tests
        run: tools/run-integration-tests --suite upstream-sqlite
