# Build the C amalgamation and upload it to the GitHub Release created by cargo-dist.
name: Release Amalgamation

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  amalgamation:
    name: Build and upload amalgamation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache Rust build artifacts
        uses: actions/cache@v5
        with:
          path: target
          key: cargo-amalg-release-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-amalg-release-${{ runner.os }}-

      - name: Build syntaqlite-buildtools
        run: cargo build --release -p syntaqlite-buildtools

      - name: Generate amalgamation
        run: |
          mkdir -p amalgamation-out
          target/release/syntaqlite-buildtools amalgamate-syntax \
            --dialect sqlite \
            --runtime-dir syntaqlite-syntax \
            --dialect-dir syntaqlite-syntax \
            --output-dir amalgamation-out

      - name: Package amalgamation
        run: |
          ARCHIVE="syntaqlite-syntax-amalgamation.tar.gz"
          cp amalgamation-out/syntaqlite_sqlite.h amalgamation-out/syntaqlite_syntax.h
          cp amalgamation-out/syntaqlite_sqlite.c amalgamation-out/syntaqlite_syntax.c
          tar -czf "${ARCHIVE}" -C amalgamation-out syntaqlite_syntax.h syntaqlite_syntax.c
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" "${ARCHIVE}"
