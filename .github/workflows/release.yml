#
# CI that:
#
# * checks for a Git Tag that looks like a release
# * builds artifacts with dist (archives, installers, hashes)
# * uploads those artifacts to temporary workflow zip
# * on success, uploads the artifacts to a GitHub Release
#
# Note that the GitHub Release will be created with a generated
# title/body based on your changelogs.

name: Release
permissions:
  "contents": "write"

# This task will run whenever you push a git tag that looks like a version
# like "1.0.0", "v0.1.0-prerelease.1", "my-app/0.1.0", "releases/v1.0.0", etc.
# Various formats will be parsed into a VERSION and an optional PACKAGE_NAME, where
# PACKAGE_NAME must be the name of a Cargo package in your workspace, and VERSION
# must be a Cargo-style SemVer Version (must have at least major.minor.patch).
#
# If PACKAGE_NAME is specified, then the announcement will be for that
# package (erroring out if it doesn't have the given version or isn't dist-able).
#
# If PACKAGE_NAME isn't specified, then the announcement will be for all
# (dist-able) packages in the workspace with that version (this mode is
# intended for workspaces with only one dist-able package, or with all dist-able
# packages versioned/released in lockstep).
#
# If you push multiple tags at once, separate instances of this workflow will
# spin up, creating an independent announcement for each one. However, GitHub
# will hard limit this to 3 tags per commit, as it will assume more tags is a
# mistake.
#
# If there's a prerelease-style suffix to the version, then the release(s)
# will be marked as a prerelease.
on:
  pull_request:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Run 'dist plan' (or host) to determine what tasks we need to do
  plan:
    runs-on: "ubuntu-22.04"
    outputs:
      val: ${{ steps.plan.outputs.manifest }}
      tag: ${{ !github.event.pull_request && github.ref_name || '' }}
      tag-flag: ${{ !github.event.pull_request && format('--tag={0}', github.ref_name) || '' }}
      publishing: ${{ !github.event.pull_request }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install dist
        # we specify bash to get pipefail; it guards against the `curl` command
        # failing. otherwise `sh` won't catch that `curl` returned non-0
        shell: bash
        run: "curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh"
      - name: Cache dist
        uses: actions/upload-artifact@v6
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/dist
      # sure would be cool if github gave us proper conditionals...
      # so here's a doubly-nested ternary-via-truthiness to try to provide the best possible
      # functionality based on whether this is a pull_request, and whether it's from a fork.
      # (PRs run on the *source* but secrets are usually on the *target* -- that's *good*
      # but also really annoying to build CI around when it needs secrets to work right.)
      - id: plan
        run: |
          dist ${{ (!github.event.pull_request && format('host --steps=create --tag={0}', github.ref_name)) || 'plan' }} --output-format=json > plan-dist-manifest.json
          echo "dist ran successfully"
          cat plan-dist-manifest.json
          echo "manifest=$(jq -c "." plan-dist-manifest.json)" >> "$GITHUB_OUTPUT"
      - name: "Upload dist-manifest.json"
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-plan-dist-manifest
          path: plan-dist-manifest.json

  # Build and packages all the platform-specific things
  build-local-artifacts:
    name: build-local-artifacts (${{ join(matrix.targets, ', ') }})
    # Let the initial task tell us to not run (currently very blunt)
    needs:
      - plan
    if: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix.include != null && (needs.plan.outputs.publishing == 'true' || fromJson(needs.plan.outputs.val).ci.github.pr_run_mode == 'upload') }}
    strategy:
      fail-fast: false
      # Target platforms/runners are computed by dist in create-release.
      # Each member of the matrix has the following arguments:
      #
      # - runner: the github runner
      # - dist-args: cli flags to pass to dist
      # - install-dist: expression to run to install dist on the runner
      #
      # Typically there will be:
      # - 1 "global" task that builds universal installers
      # - N "local" tasks that build each platform's binaries and platform-specific installers
      matrix: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container && matrix.container.image || null }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: target/distrib/${{ join(matrix.targets, '-') }}-dist-manifest.json
    steps:
      - name: enable windows longpaths
        run: |
          git config --global core.longpaths true
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install Rust non-interactively if not already installed
        if: ${{ matrix.container }}
        run: |
          if ! command -v cargo > /dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          fi
      - name: Install dist
        run: ${{ matrix.install_dist.run }}
      # Get the dist-manifest
      - name: Fetch local artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - name: Install dependencies
        run: |
          ${{ matrix.packages_install }}
      - name: Build artifacts
        run: |
          # Actually do builds and make zips and whatnot
          dist build ${{ needs.plan.outputs.tag-flag }} --print=linkage --output-format=json ${{ matrix.dist_args }} > dist-manifest.json
          echo "dist ran successfully"
      - id: cargo-dist
        name: Post-build
        # We force bash here just because github makes it really hard to get values up
        # to "real" actions without writing to env-vars, and writing to env-vars has
        # inconsistent syntax between shell and powershell.
        shell: bash
        run: |
          # Parse out what we just built and upload it to scratch storage
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          dist print-upload-files-from-manifest --manifest dist-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          cp dist-manifest.json "$BUILD_MANIFEST_NAME"
      - name: "Upload artifacts"
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-build-local-${{ join(matrix.targets, '_') }}
          path: |
            ${{ steps.cargo-dist.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}

  # Smoke-test built binaries on each platform
  smoke-test:
    name: smoke-test (${{ matrix.name }})
    needs:
      - plan
      - build-local-artifacts
    if: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix.include != null }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            archive: "*.tar.gz"
            binary: syntaqlite
          - name: Linux x64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: "*.tar.gz"
            binary: syntaqlite
          - name: Windows x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive: "*.zip"
            binary: syntaqlite.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: artifacts-build-local-${{ matrix.target }}
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        shell: bash
        run: ls -la artifacts/

      - name: Extract binary
        shell: bash
        run: |
          mkdir -p bin/ extracted/
          ARCHIVE=$(find artifacts/ -name "syntaqlite-cli-${{ matrix.target }}.*" | head -1)
          echo "Found archive: $ARCHIVE"
          if [[ "$ARCHIVE" == *.zip ]]; then
            unzip "$ARCHIVE" -d extracted/
          else
            tar -xf "$ARCHIVE" -C extracted/
          fi
          find extracted/ -name "${{ matrix.binary }}" -exec cp {} bin/ \;
          chmod +x bin/${{ matrix.binary }}
          echo "$PWD/bin" >> "$GITHUB_PATH"

      - name: Verify version
        shell: bash
        run: syntaqlite --version

      - name: Verify format
        shell: bash
        run: echo "select 1" | syntaqlite fmt

      - name: Verify validate
        shell: bash
        run: echo "select 1" | syntaqlite validate

  # Build and package all the platform-agnostic(ish) things
  build-global-artifacts:
    needs:
      - plan
      - build-local-artifacts
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: target/distrib/global-dist-manifest.json
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install cached dist
        uses: actions/download-artifact@v7
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/
      - run: chmod +x ~/.cargo/bin/dist
      # Get all the local artifacts for the global tasks to use (for e.g. checksums)
      - name: Fetch local artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - id: cargo-dist
        shell: bash
        run: |
          dist build ${{ needs.plan.outputs.tag-flag }} --output-format=json "--artifacts=global" > dist-manifest.json
          echo "dist ran successfully"

          # Parse out what we just built and upload it to scratch storage
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          jq --raw-output ".upload_files[]" dist-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          cp dist-manifest.json "$BUILD_MANIFEST_NAME"
      - name: "Upload artifacts"
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-build-global
          path: |
            ${{ steps.cargo-dist.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}
  # Determines if we should publish/announce
  host:
    needs:
      - plan
      - build-local-artifacts
      - build-global-artifacts
      - smoke-test
    # Only run if we're "publishing", and only if plan, local, global, and smoke-test didn't fail (skipped is fine)
    if: ${{ always() && needs.plan.result == 'success' && needs.plan.outputs.publishing == 'true' && (needs.build-global-artifacts.result == 'skipped' || needs.build-global-artifacts.result == 'success') && (needs.build-local-artifacts.result == 'skipped' || needs.build-local-artifacts.result == 'success') && (needs.smoke-test.result == 'skipped' || needs.smoke-test.result == 'success') }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    runs-on: "ubuntu-22.04"
    outputs:
      val: ${{ steps.host.outputs.manifest }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install cached dist
        uses: actions/download-artifact@v7
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/
      - run: chmod +x ~/.cargo/bin/dist
      # Fetch artifacts from scratch-storage
      - name: Fetch artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - id: host
        shell: bash
        run: |
          dist host ${{ needs.plan.outputs.tag-flag }} --steps=upload --steps=release --output-format=json > dist-manifest.json
          echo "artifacts uploaded and released successfully"
          cat dist-manifest.json
          echo "manifest=$(jq -c "." dist-manifest.json)" >> "$GITHUB_OUTPUT"
      - name: "Upload dist-manifest.json"
        uses: actions/upload-artifact@v6
        with:
          # Overwrite the previous copy
          name: artifacts-dist-manifest
          path: dist-manifest.json
      # Create a GitHub Release while uploading all files to it
      - name: "Download GitHub Artifacts"
        uses: actions/download-artifact@v7
        with:
          pattern: artifacts-*
          path: artifacts
          merge-multiple: true
      - name: Cleanup
        run: |
          # Remove cargo-dist metadata and Homebrew formula from release assets
          rm -f artifacts/*-dist-manifest.json
          rm -f artifacts/dist-manifest.json
          rm -f artifacts/*.rb
      - name: Rename artifacts to friendly names
        run: |
          cd artifacts
          for f in *; do
            new=$(echo "$f" \
              | sed 's/syntaqlite-cli-/syntaqlite-/' \
              | sed 's/aarch64-apple-darwin/macos-arm64/' \
              | sed 's/x86_64-apple-darwin/macos-x64/' \
              | sed 's/aarch64-unknown-linux-gnu/linux-arm64/' \
              | sed 's/x86_64-unknown-linux-gnu/linux-x64/' \
              | sed 's/x86_64-pc-windows-msvc/windows-x64/' \
              | sed 's/aarch64-pc-windows-msvc/windows-arm64/')
            if [ "$f" != "$new" ]; then
              mv "$f" "$new"
              echo "  $f -> $new"
            fi
          done
      - name: Upload artifacts to GitHub Release
        env:
          RELEASE_TAG: "${{ needs.plan.outputs.tag }}"
          RELEASE_COMMIT: "${{ github.sha }}"
        run: |
          # If the release was already created manually, just upload artifacts.
          # Otherwise create a draft release so artifacts have somewhere to go.
          if gh release view "$RELEASE_TAG" > /dev/null 2>&1; then
            echo "Release $RELEASE_TAG exists — uploading artifacts"
            gh release upload "$RELEASE_TAG" artifacts/* --clobber
          else
            echo "Release $RELEASE_TAG not found — creating draft"
            gh release create "$RELEASE_TAG" --target "$RELEASE_COMMIT" \
              --draft --title "$RELEASE_TAG" --generate-notes artifacts/*
          fi

  # Single Rust build per platform: produces static lib (for Python C extension),
  # cdylib (for clib), and buildtools (for amalgamation). Downstream jobs download
  # these artifacts instead of rebuilding Rust.
  build-rust-libs:
    name: rust-libs (${{ matrix.name }})
    needs:
      - plan
    if: ${{ needs.plan.outputs.publishing == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native builds (produce staticlib + cdylib + buildtools)
          - {name: macos-arm64, runner: macos-latest, target: aarch64-apple-darwin, staticlib: libsyntaqlite.a, cdylib: libsyntaqlite.dylib}
          - {name: macos-x64, runner: macos-26-intel, target: x86_64-apple-darwin, staticlib: libsyntaqlite.a, cdylib: libsyntaqlite.dylib}
          - {name: linux-x64, runner: ubuntu-latest, target: x86_64-unknown-linux-gnu, staticlib: libsyntaqlite.a, cdylib: libsyntaqlite.so}
          - {name: linux-arm64, runner: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu, staticlib: libsyntaqlite.a, cdylib: libsyntaqlite.so}
          - {name: windows-x64, runner: windows-latest, target: x86_64-pc-windows-msvc, staticlib: syntaqlite.lib, cdylib: syntaqlite.dll}
          # Cross-compiled (cdylib only — no Python extension for this platform)
          - {name: windows-arm64, runner: windows-latest, target: aarch64-pc-windows-msvc, cdylib: syntaqlite.dll}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Install cross-compilation target
        if: matrix.name == 'windows-arm64'
        run: rustup target add ${{ matrix.target }}

      - name: Build static library
        if: matrix.staticlib
        shell: bash
        run: cargo build -p syntaqlite --release

      - name: Build buildtools
        if: matrix.name == 'linux-x64'
        shell: bash
        run: cargo build -p syntaqlite-buildtools --release

      - name: Build cdylib
        shell: bash
        env:
          SYNTAQLITE_BUILDING: "1"
        run: |
          cargo rustc -p syntaqlite --release ${{ matrix.name == 'windows-arm64' && format('--target {0}', matrix.target) || '' }} \
            --crate-type cdylib \
            -- -C default-linker-libraries

      - name: Upload static library
        if: matrix.staticlib
        uses: actions/upload-artifact@v6
        with:
          name: staticlib-${{ matrix.name }}
          path: target/release/${{ matrix.staticlib }}

      - name: Upload cdylib
        uses: actions/upload-artifact@v6
        with:
          name: clib-${{ matrix.name }}
          path: target/${{ matrix.name == 'windows-arm64' && format('{0}/release', matrix.target) || 'release' }}/${{ matrix.cdylib }}

      - name: Upload buildtools
        if: matrix.name == 'linux-x64'
        uses: actions/upload-artifact@v6
        with:
          name: buildtools
          path: target/release/syntaqlite-buildtools

  # Build Python C extension and package wheel. Downloads pre-built static lib
  # instead of compiling Rust. One job per platform × Python version.
  build-python-wheel:
    name: python-wheel (${{ matrix.platform.target }}, ${{ matrix.python }})
    needs:
      - plan
      - build-local-artifacts
      - build-rust-libs
    if: ${{ needs.plan.outputs.publishing == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        platform:
          - {target: aarch64-apple-darwin, runner: macos-latest, binary: syntaqlite, lib-name: macos-arm64}
          - {target: x86_64-apple-darwin, runner: macos-26-intel, binary: syntaqlite, lib-name: macos-x64}
          - {target: x86_64-unknown-linux-gnu, runner: ubuntu-latest, binary: syntaqlite, lib-name: linux-x64}
          - {target: aarch64-unknown-linux-gnu, runner: ubuntu-24.04-arm, binary: syntaqlite, lib-name: linux-arm64}
          - {target: x86_64-pc-windows-msvc, runner: windows-latest, binary: syntaqlite.exe, lib-name: windows-x64}
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      # -- Download pre-built static library --
      - name: Download static library
        uses: actions/download-artifact@v7
        with:
          name: staticlib-${{ matrix.platform.lib-name }}
          path: target/release/

      # -- Build C extension (fast — just C compilation, no Rust) --
      - name: Install setuptools
        run: pip install "setuptools>=68"

      - name: Build C extension
        shell: bash
        working-directory: python
        run: python setup.py build_ext --inplace

      - name: Find extension module
        id: find-ext
        shell: bash
        run: |
          EXT=$(find python/syntaqlite -name '_syntaqlite*' \( -name '*.so' -o -name '*.pyd' \) | head -1)
          if [ -z "$EXT" ]; then
            echo "ERROR: Extension module not found"
            exit 1
          fi
          echo "path=$EXT" >> "$GITHUB_OUTPUT"
          echo "Found extension: $EXT"

      - name: Smoke test extension
        shell: bash
        run: |
          cd python
          python -c "from syntaqlite._syntaqlite import parse; print(parse('SELECT 1'))"

      # -- Download CLI binary and build wheel --
      - name: Download CLI build artifacts
        uses: actions/download-artifact@v7
        with:
          name: artifacts-build-local-${{ matrix.platform.target }}
          path: artifacts/

      - name: Extract CLI binary
        shell: bash
        run: |
          mkdir -p bin/ extracted/
          ARCHIVE=$(find artifacts/ -name "syntaqlite-cli-${{ matrix.platform.target }}.*" | head -1)
          echo "Found archive: $ARCHIVE"
          if [[ "$ARCHIVE" == *.zip ]]; then
            unzip "$ARCHIVE" -d extracted/
          else
            tar -xf "$ARCHIVE" -C extracted/
          fi
          find extracted/ -name "${{ matrix.platform.binary }}" -exec cp {} bin/ \;
          chmod +x bin/${{ matrix.platform.binary }}

      - name: Derive python tag
        id: pytag
        shell: bash
        run: |
          PYVER="${{ matrix.python }}"
          TAG="cp${PYVER/./}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build wheel
        shell: bash
        run: |
          python python/dev/build_wheel.py \
            --binary bin/${{ matrix.platform.binary }} \
            --ext "${{ steps.find-ext.outputs.path }}" \
            --python-tag ${{ steps.pytag.outputs.tag }} \
            --platform ${{ matrix.platform.target }} \
            --out dist/

      - name: Smoke test wheel
        shell: bash
        run: |
          pip install dist/*.whl
          python -c "from syntaqlite import format_sql; assert 'SELECT' in format_sql('select 1')"

      - name: Upload wheel
        uses: actions/upload-artifact@v6
        with:
          name: wheel-${{ matrix.platform.target }}-${{ steps.pytag.outputs.tag }}
          path: dist/*.whl

  # CLI-only wheel for platforms without a C extension.
  build-python-wheel-cli-only:
    name: python-wheel (aarch64-pc-windows-msvc, cli-only)
    needs:
      - plan
      - build-local-artifacts
    if: ${{ needs.plan.outputs.publishing == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download CLI build artifacts
        uses: actions/download-artifact@v7
        with:
          name: artifacts-build-local-aarch64-pc-windows-msvc
          path: artifacts/

      - name: Extract CLI binary
        run: |
          mkdir -p bin/ extracted/
          ARCHIVE=$(find artifacts/ -name "syntaqlite-cli-aarch64-pc-windows-msvc.*" | head -1)
          unzip "$ARCHIVE" -d extracted/
          find extracted/ -name "syntaqlite.exe" -exec cp {} bin/ \;

      - name: Build wheel
        run: |
          python python/dev/build_wheel.py \
            --binary bin/syntaqlite.exe \
            --platform aarch64-pc-windows-msvc \
            --out dist/

      - name: Upload wheel
        uses: actions/upload-artifact@v6
        with:
          name: wheel-aarch64-pc-windows-msvc-cli
          path: dist/*.whl

  # Publish all wheels to PyPI in a single job.
  publish-pypi:
    name: Publish to PyPI
    needs:
      - plan
      - build-python-wheel
      - build-python-wheel-cli-only
    if: ${{ needs.plan.outputs.publishing == 'true' }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v7
        with:
          pattern: wheel-*
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  # Package clib archive + syntax amalgamation and upload to GH Release.
  # Downloads pre-built cdylibs and buildtools — no Rust compilation.
  package-c-artifacts:
    name: Package C artifacts
    needs:
      - plan
      - host
      - build-rust-libs
    if: ${{ needs.plan.outputs.publishing == 'true' }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Download buildtools
        uses: actions/download-artifact@v7
        with:
          name: buildtools
          path: bin/

      - name: Make buildtools executable
        run: chmod +x bin/syntaqlite-buildtools

      # -- Clib archive --
      - name: Generate amalgamated header
        run: |
          bin/syntaqlite-buildtools amalgamate \
            --syntax-dir syntaqlite-syntax \
            --lib-dir syntaqlite \
            --output staging/syntaqlite.h

      - name: Download all platform libraries
        uses: actions/download-artifact@v7
        with:
          pattern: clib-*
          path: libs/

      - name: Assemble clib archive
        run: |
          for dir in libs/clib-*; do
            platform=$(basename "$dir" | sed 's/^clib-//')
            mkdir -p "staging/$platform"
            cp "$dir"/* "staging/$platform/"
          done
          tar -czf "syntaqlite-clib.tar.gz" -C staging .

      # -- Syntax amalgamation --
      - name: Generate syntax amalgamation
        run: |
          mkdir -p amalgamation-out
          bin/syntaqlite-buildtools amalgamate-syntax \
            --dialect sqlite \
            --runtime-dir syntaqlite-syntax \
            --dialect-dir syntaqlite-syntax \
            --output-dir amalgamation-out
          cp amalgamation-out/syntaqlite_sqlite.h amalgamation-out/syntaqlite_syntax.h
          cp amalgamation-out/syntaqlite_sqlite.c amalgamation-out/syntaqlite_syntax.c
          tar -czf "syntaqlite-syntax-amalgamation.tar.gz" \
            -C amalgamation-out syntaqlite_syntax.h syntaqlite_syntax.c

      # -- Upload both to GH Release --
      - name: Upload to GitHub Release
        run: |
          gh release upload "${{ needs.plan.outputs.tag }}" \
            "syntaqlite-clib.tar.gz" \
            "syntaqlite-syntax-amalgamation.tar.gz" \
            --clobber

  announce:
    needs:
      - plan
      - host
    # use "always() && ..." to allow us to wait for all publish jobs while
    # still allowing individual publish jobs to skip themselves (for prereleases).
    # "host" however must run to completion, no skipping allowed!
    if: ${{ always() && needs.host.result == 'success' }}
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
