# Build all release artifacts and publish.
#
# On version tag push: builds CLI binaries, Python wheels, C libraries,
# amalgamation archives, and publishes to PyPI and GitHub Releases.
# On pull_request: builds CLI binaries only (smoke test).
name: Release

permissions:
  contents: write

on:
  pull_request:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Single Rust build per platform. Produces:
  #   - CLI binary archive (tar.gz/zip)
  #   - Static library (for clib archive)
  #   - Shared library / cdylib (for clib)
  #   - buildtools binary (for amalgamation, linux-x64 only)
  build:
    name: build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - {name: macos-arm64, runner: macos-latest, target: aarch64-apple-darwin, binary: syntaqlite, staticlib: libsyntaqlite.a, cdylib: libsyntaqlite.dylib, archive: tar.gz}
          - {name: macos-x64, runner: macos-26-intel, target: x86_64-apple-darwin, binary: syntaqlite, staticlib: libsyntaqlite.a, cdylib: libsyntaqlite.dylib, archive: tar.gz}
          - {name: linux-x64, runner: ubuntu-latest, target: x86_64-unknown-linux-gnu, binary: syntaqlite, staticlib: libsyntaqlite.a, cdylib: libsyntaqlite.so, archive: tar.gz}
          - {name: linux-arm64, runner: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu, binary: syntaqlite, staticlib: libsyntaqlite.a, cdylib: libsyntaqlite.so, archive: tar.gz}
          - {name: windows-x64, runner: windows-latest, target: x86_64-pc-windows-msvc, binary: syntaqlite.exe, staticlib: syntaqlite.lib, cdylib: syntaqlite.dll, archive: zip}
          - {name: windows-arm64, runner: windows-latest, target: aarch64-pc-windows-msvc, binary: syntaqlite.exe, cdylib: syntaqlite.dll, archive: zip}
    runs-on: ${{ matrix.runner }}
    env:
      SYNTAQLITE_BUILDING: "1"
    steps:
      - uses: actions/checkout@v6

      - name: Install cross-compilation target
        if: matrix.name == 'windows-arm64'
        run: rustup target add ${{ matrix.target }}

      # -- Build everything in one cargo invocation where possible --
      - name: Build CLI + static library
        if: matrix.staticlib
        shell: bash
        run: cargo build --release -p syntaqlite-cli -p syntaqlite

      - name: Build CLI (cross-compiled)
        if: ${{ !matrix.staticlib }}
        shell: bash
        run: cargo build --release -p syntaqlite-cli --target ${{ matrix.target }}

      - name: Build buildtools
        if: matrix.name == 'linux-x64'
        shell: bash
        run: cargo build --release -p syntaqlite-buildtools

      - name: Build cdylib
        shell: bash
        run: |
          cargo rustc -p syntaqlite --release ${{ !matrix.staticlib && format('--target {0}', matrix.target) || '' }} \
            --crate-type cdylib \
            -- -C default-linker-libraries

      # -- Smoke test CLI --
      - name: Smoke test CLI
        if: matrix.staticlib
        shell: bash
        run: |
          target/release/${{ matrix.binary }} --version
          echo "select 1" | target/release/${{ matrix.binary }} fmt
          echo "select 1" | target/release/${{ matrix.binary }} validate

      # -- Package CLI archive --
      - name: Package CLI (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          mkdir -p staging/
          cp target/release/${{ matrix.binary }} staging/
          tar -czf "syntaqlite-${{ matrix.name }}.tar.gz" -C staging ${{ matrix.binary }}

      - name: Package CLI (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          mkdir -p staging/
          BINARY_DIR=${{ !matrix.staticlib && format('target/{0}/release', matrix.target) || 'target/release' }}
          cp "$BINARY_DIR/${{ matrix.binary }}" staging/
          cd staging && 7z a -tzip "../syntaqlite-${{ matrix.name }}.zip" "${{ matrix.binary }}"

      # -- Upload all artifacts --
      - name: Upload CLI archive
        uses: actions/upload-artifact@v6
        with:
          name: cli-${{ matrix.name }}
          path: syntaqlite-${{ matrix.name }}.${{ matrix.archive }}

      - name: Upload static library
        if: matrix.staticlib
        uses: actions/upload-artifact@v6
        with:
          name: staticlib-${{ matrix.name }}
          path: target/release/${{ matrix.staticlib }}

      - name: Upload cdylib
        uses: actions/upload-artifact@v6
        with:
          name: clib-${{ matrix.name }}
          path: ${{ !matrix.staticlib && format('target/{0}/release', matrix.target) || 'target/release' }}/${{ matrix.cdylib }}

      - name: Upload buildtools
        if: matrix.name == 'linux-x64'
        uses: actions/upload-artifact@v6
        with:
          name: buildtools
          path: target/release/syntaqlite-buildtools

  # Upload CLI archives to GitHub Release.
  upload-release:
    name: Upload to GitHub Release
    needs: build
    if: ${{ !github.event.pull_request }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Download all CLI archives
        uses: actions/download-artifact@v7
        with:
          pattern: cli-*
          path: archives/
          merge-multiple: true

      - name: Upload to GitHub Release
        run: |
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG exists — uploading artifacts"
            gh release upload "$TAG" archives/* --clobber
          else
            echo "Release $TAG not found — creating draft"
            gh release create "$TAG" --target "${{ github.sha }}" \
              --draft --title "$TAG" --generate-notes archives/*
          fi

      - name: Update Homebrew tap
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          SHA_MACOS_ARM64=$(sha256sum archives/syntaqlite-macos-arm64.tar.gz | cut -d' ' -f1)
          SHA_MACOS_X64=$(sha256sum archives/syntaqlite-macos-x64.tar.gz | cut -d' ' -f1)
          SHA_LINUX_X64=$(sha256sum archives/syntaqlite-linux-x64.tar.gz | cut -d' ' -f1)
          SHA_LINUX_ARM64=$(sha256sum archives/syntaqlite-linux-arm64.tar.gz | cut -d' ' -f1)

          cat > formula.rb << FORMULA
          class Syntaqlite < Formula
            desc "Fast, accurate SQLite SQL formatter, validator, and language server"
            homepage "https://syntaqlite.com"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/LalitMaganti/syntaqlite/releases/download/${TAG}/syntaqlite-macos-arm64.tar.gz"
                sha256 "${SHA_MACOS_ARM64}"
              else
                url "https://github.com/LalitMaganti/syntaqlite/releases/download/${TAG}/syntaqlite-macos-x64.tar.gz"
                sha256 "${SHA_MACOS_X64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/LalitMaganti/syntaqlite/releases/download/${TAG}/syntaqlite-linux-arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              else
                url "https://github.com/LalitMaganti/syntaqlite/releases/download/${TAG}/syntaqlite-linux-x64.tar.gz"
                sha256 "${SHA_LINUX_X64}"
              end
            end

            def install
              bin.install "syntaqlite"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/syntaqlite --version")
            end
          end
          FORMULA

          # Push formula to tap repo
          gh api repos/LalitMaganti/homebrew-tap/contents/Formula/syntaqlite.rb \
            --method PUT \
            --field message="Update syntaqlite to ${VERSION}" \
            --field content="$(base64 -w0 formula.rb)" \
            --field sha="$(gh api repos/LalitMaganti/homebrew-tap/contents/Formula/syntaqlite.rb --jq '.sha')"

  # Build Python wheels using cibuildwheel. Builds Rust from source inside
  # each platform's environment, then compiles the C extension per Python version.
  # Includes native platforms + Pyodide (WASM).
  build-python-wheels:
    name: python-wheels (${{ matrix.os }}, ${{ matrix.cibw_archs }})
    if: ${{ !github.event.pull_request }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - {os: ubuntu-latest, cibw_archs: "x86_64"}
          - {os: ubuntu-24.04-arm, cibw_archs: "aarch64"}
          - {os: macos-latest, cibw_archs: "arm64"}
          - {os: macos-26-intel, cibw_archs: "x86_64"}
          - {os: windows-latest, cibw_archs: "AMD64 ARM64"}
          - {os: ubuntu-latest, cibw_archs: "pyodide", cibw_platform: "pyodide"}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: pypa/cibuildwheel@v2
        with:
          package-dir: python/
          output-dir: wheelhouse/
        env:
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          CIBW_PLATFORM: ${{ matrix.cibw_platform || '' }}

      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.cibw_archs }}
          path: wheelhouse/*.whl

  # Publish all wheels to PyPI in a single job.
  publish-pypi:
    name: Publish to PyPI
    needs: [build-python-wheels]
    if: ${{ !github.event.pull_request }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v7
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  # Package clib archive + syntax amalgamation and upload to GH Release.
  package-c-artifacts:
    name: Package C artifacts
    needs:
      - build
      - upload-release
    if: ${{ !github.event.pull_request }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Download buildtools
        uses: actions/download-artifact@v7
        with:
          name: buildtools
          path: bin/

      - name: Make buildtools executable
        run: chmod +x bin/syntaqlite-buildtools

      # -- Clib archive --
      - name: Generate amalgamated header
        run: |
          bin/syntaqlite-buildtools amalgamate \
            --syntax-dir syntaqlite-syntax \
            --lib-dir syntaqlite \
            --output staging/syntaqlite.h

      - name: Download all platform libraries
        uses: actions/download-artifact@v7
        with:
          pattern: clib-*
          path: libs/

      - name: Assemble clib archive
        run: |
          for dir in libs/clib-*; do
            platform=$(basename "$dir" | sed 's/^clib-//')
            mkdir -p "staging/$platform"
            cp "$dir"/* "staging/$platform/"
          done
          tar -czf "syntaqlite-clib.tar.gz" -C staging .

      # -- Syntax amalgamation --
      - name: Generate syntax amalgamation
        run: |
          mkdir -p amalgamation-out
          bin/syntaqlite-buildtools amalgamate-syntax \
            --dialect sqlite \
            --runtime-dir syntaqlite-syntax \
            --dialect-dir syntaqlite-syntax \
            --output-dir amalgamation-out
          cp amalgamation-out/syntaqlite_sqlite.h amalgamation-out/syntaqlite_syntax.h
          cp amalgamation-out/syntaqlite_sqlite.c amalgamation-out/syntaqlite_syntax.c
          tar -czf "syntaqlite-syntax-amalgamation.tar.gz" \
            -C amalgamation-out syntaqlite_syntax.h syntaqlite_syntax.c

      # -- Upload both to GH Release --
      - name: Upload to GitHub Release
        run: |
          gh release upload "${{ github.ref_name }}" \
            "syntaqlite-clib.tar.gz" \
            "syntaqlite-syntax-amalgamation.tar.gz" \
            --clobber
