# Publish Rust crates to crates.io on release tags.
# Crates are published in dependency order.
name: Publish Crates

on:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Cache third_party
        uses: actions/cache@v5
        with:
          path: third_party
          key: third-party-${{ runner.os }}-${{ hashFiles('python/tools/install_build_deps.py') }}

      - name: Install build dependencies
        run: python3 tools/install-build-deps

      - name: Publish crates (dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p syntaqlite-common --no-verify
          cargo publish -p syntaqlite-syntax --no-verify
          cargo publish -p syntaqlite --no-verify
          cargo publish -p syntaqlite-buildtools --no-verify
          cargo publish -p syntaqlite-cli --no-verify
