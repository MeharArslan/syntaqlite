# Test published package install methods (pip, Homebrew, download script).
# Runs after a GitHub Release is published. Can also be triggered manually.
name: Test Install

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-pip:
    name: pip (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # PyPI publishing is async — retry until the package is available
      - name: Install via pip
        shell: bash
        run: |
          for attempt in 1 2 3 4 5 6; do
            if pip install --no-cache-dir syntaqlite 2>&1; then
              break
            fi
            echo "Attempt $attempt: package not yet available, waiting 60s..."
            sleep 60
          done

      - name: Verify
        shell: bash
        run: |
          syntaqlite --version
          echo "SELECT 1" | syntaqlite fmt
          echo "SELECT 1" | syntaqlite validate

  test-brew:
    name: Homebrew
    runs-on: macos-latest
    steps:
      - name: Install via Homebrew
        run: brew install LalitMaganti/tap/syntaqlite

      - name: Verify
        run: |
          syntaqlite --version
          echo "SELECT 1" | syntaqlite fmt
          echo "SELECT 1" | syntaqlite validate

  test-download-script:
    name: Download script (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Install (Unix)
        if: runner.os != 'Windows'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sSf https://raw.githubusercontent.com/LalitMaganti/syntaqlite/main/tools/syntaqlite | python3 - install "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install (Windows)
        if: runner.os == 'Windows'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sSf https://raw.githubusercontent.com/LalitMaganti/syntaqlite/main/tools/syntaqlite | python3 - install "$USERPROFILE/.local/bin"
          echo "$USERPROFILE/.local/bin" >> "$GITHUB_PATH"

      - name: Verify
        shell: bash
        run: |
          syntaqlite --version
          echo "SELECT 1" | syntaqlite fmt
          echo "SELECT 1" | syntaqlite validate
