name: Deploy Playground (Autopush)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-playground-autopush
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: python3 tools/install-build-deps --ui

      - name: Build WASM modules
        run: python3 tools/build-web-playground --hermetic

      - name: Build @syntaqlite/js
        working-directory: web/syntaqlite-js
        run: |
          export PATH="$PWD/../../third_party/bin/linux-amd64/nodejs/bin:$PATH"
          npm install
          npx tsc

      - name: Install npm dependencies
        working-directory: web/playground
        run: |
          export PATH="$PWD/../../third_party/bin/linux-amd64/nodejs/bin:$PATH"
          npm install

      - name: Build frontend
        working-directory: web/playground
        run: |
          export PATH="$PWD/../../third_party/bin/linux-amd64/nodejs/bin:$PATH"
          npx tsc --noEmit
          npx vite build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: syntaqlite-playground-autopush
          directory: web/playground/dist
