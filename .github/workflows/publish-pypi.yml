# Build platform-specific Python wheels with the pre-built CLI binary
# and publish to PyPI on release tags.
#
# Waits for the Release workflow (cargo-dist) to complete, downloads
# CLI binaries from the GitHub Release, and packages them into wheels
# using python/dev/build_wheel.py (following the go-to-wheel pattern).
#
# For platforms with a C extension, we also download the pre-compiled
# extension from the Release workflow's artifacts and produce per-Python-
# version wheels (cp310-cp310-*, cp311-cp311-*, etc.).
#
# Uses PyPI trusted publishing (OIDC) — no API token needed. Configure
# at https://pypi.org/manage/account/publishing/ with:
#   Owner: LalitMaganti
#   Repository: syntaqlite
#   Workflow: publish-pypi.yml
#   Environment: pypi
name: Publish PyPI

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: write
  actions: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-wheels:
    name: Build wheel (${{ matrix.target }}, ${{ matrix.python-tag || 'cli-only' }})
    if: github.event.workflow_run.conclusion == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Wheels with C extension (5 platforms × 4 Python versions = 20) ---
          # aarch64-apple-darwin (macos-latest is ARM64)
          - {target: aarch64-apple-darwin, runner: macos-latest, archive: syntaqlite-macos-arm64.tar.gz, binary: syntaqlite, python-tag: cp310}
          - {target: aarch64-apple-darwin, runner: macos-latest, archive: syntaqlite-macos-arm64.tar.gz, binary: syntaqlite, python-tag: cp311}
          - {target: aarch64-apple-darwin, runner: macos-latest, archive: syntaqlite-macos-arm64.tar.gz, binary: syntaqlite, python-tag: cp312}
          - {target: aarch64-apple-darwin, runner: macos-latest, archive: syntaqlite-macos-arm64.tar.gz, binary: syntaqlite, python-tag: cp313}
          # x86_64-apple-darwin
          - {target: x86_64-apple-darwin, runner: macos-26-intel, archive: syntaqlite-macos-x64.tar.gz, binary: syntaqlite, python-tag: cp310}
          - {target: x86_64-apple-darwin, runner: macos-26-intel, archive: syntaqlite-macos-x64.tar.gz, binary: syntaqlite, python-tag: cp311}
          - {target: x86_64-apple-darwin, runner: macos-26-intel, archive: syntaqlite-macos-x64.tar.gz, binary: syntaqlite, python-tag: cp312}
          - {target: x86_64-apple-darwin, runner: macos-26-intel, archive: syntaqlite-macos-x64.tar.gz, binary: syntaqlite, python-tag: cp313}
          # x86_64-unknown-linux-gnu
          - {target: x86_64-unknown-linux-gnu, runner: ubuntu-latest, archive: syntaqlite-linux-x64.tar.gz, binary: syntaqlite, python-tag: cp310}
          - {target: x86_64-unknown-linux-gnu, runner: ubuntu-latest, archive: syntaqlite-linux-x64.tar.gz, binary: syntaqlite, python-tag: cp311}
          - {target: x86_64-unknown-linux-gnu, runner: ubuntu-latest, archive: syntaqlite-linux-x64.tar.gz, binary: syntaqlite, python-tag: cp312}
          - {target: x86_64-unknown-linux-gnu, runner: ubuntu-latest, archive: syntaqlite-linux-x64.tar.gz, binary: syntaqlite, python-tag: cp313}
          # aarch64-unknown-linux-gnu (cross-compiled, no native runner)
          - {target: aarch64-unknown-linux-gnu, runner: ubuntu-latest, archive: syntaqlite-linux-arm64.tar.gz, binary: syntaqlite, python-tag: cp310}
          - {target: aarch64-unknown-linux-gnu, runner: ubuntu-latest, archive: syntaqlite-linux-arm64.tar.gz, binary: syntaqlite, python-tag: cp311}
          - {target: aarch64-unknown-linux-gnu, runner: ubuntu-latest, archive: syntaqlite-linux-arm64.tar.gz, binary: syntaqlite, python-tag: cp312}
          - {target: aarch64-unknown-linux-gnu, runner: ubuntu-latest, archive: syntaqlite-linux-arm64.tar.gz, binary: syntaqlite, python-tag: cp313}
          # x86_64-pc-windows-msvc
          - {target: x86_64-pc-windows-msvc, runner: windows-latest, archive: syntaqlite-windows-x64.zip, binary: syntaqlite.exe, python-tag: cp310}
          - {target: x86_64-pc-windows-msvc, runner: windows-latest, archive: syntaqlite-windows-x64.zip, binary: syntaqlite.exe, python-tag: cp311}
          - {target: x86_64-pc-windows-msvc, runner: windows-latest, archive: syntaqlite-windows-x64.zip, binary: syntaqlite.exe, python-tag: cp312}
          - {target: x86_64-pc-windows-msvc, runner: windows-latest, archive: syntaqlite-windows-x64.zip, binary: syntaqlite.exe, python-tag: cp313}
          # --- CLI-only wheel (no C extension available) ---
          - {target: aarch64-pc-windows-msvc, runner: ubuntu-latest, archive: syntaqlite-windows-arm64.zip, binary: syntaqlite.exe}

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Determine Python version
        id: pyver
        run: |
          TAG="${{ matrix.python-tag }}"
          if [ -n "$TAG" ]; then
            # cp310 -> 3.10, cp313 -> 3.13
            echo "version=${TAG:2:1}.${TAG:3}" >> "$GITHUB_OUTPUT"
          else
            echo "version=3.12" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: '${{ steps.pyver.outputs.version }}'

      - name: Get release tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the tag from the workflow run that triggered us
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          echo "tag=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Download binary from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          ARCHIVE="${{ matrix.archive }}"
          # Retry up to 5 times with 30s delay — assets may not be available
          # immediately after the Release workflow completes
          for attempt in 1 2 3 4 5; do
            ASSET_URL=$(gh api "repos/${{ github.repository }}/releases" --paginate -q \
              '.[] | select(.tag_name == "'"$TAG"'") | .assets[] | select(.name == "'"$ARCHIVE"'") | .url')
            if [ -n "$ASSET_URL" ]; then
              break
            fi
            echo "Attempt $attempt: asset $ARCHIVE not yet available, waiting 30s..."
            sleep 30
          done
          if [ -z "$ASSET_URL" ]; then
            echo "Asset $ARCHIVE not found in release $TAG after 5 attempts"
            exit 1
          fi
          mkdir -p tmp/
          curl -fSL -H "Authorization: token $GH_TOKEN" -H "Accept: application/octet-stream" \
            "$ASSET_URL" -o "tmp/$ARCHIVE"

      - name: Extract binary
        run: |
          mkdir -p bin/ extracted/
          ARCHIVE="tmp/${{ matrix.archive }}"
          if [[ "$ARCHIVE" == *.zip ]]; then
            unzip "$ARCHIVE" -d extracted/
          else
            tar -xf "$ARCHIVE" -C extracted/
          fi
          find extracted/ -name "${{ matrix.binary }}" -exec cp {} bin/ \;
          chmod +x bin/${{ matrix.binary }}

      - name: Download C extension
        if: matrix.python-tag
        uses: actions/download-artifact@v7
        with:
          name: python-ext-${{ matrix.target }}-${{ matrix.python-tag }}
          path: ext/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build wheel (with extension)
        if: matrix.python-tag
        run: |
          python python/dev/build_wheel.py \
            --binary bin/${{ matrix.binary }} \
            --ext "ext/_syntaqlite*" \
            --python-tag ${{ matrix.python-tag }} \
            --platform ${{ matrix.target }} \
            --out dist/

      - name: Build wheel (CLI-only)
        if: ${{ !matrix.python-tag }}
        run: |
          python python/dev/build_wheel.py \
            --binary bin/${{ matrix.binary }} \
            --platform ${{ matrix.target }} \
            --out dist/

      - name: Smoke test wheel
        if: matrix.python-tag && !contains(matrix.target, 'aarch64-unknown-linux') && !contains(matrix.target, 'aarch64-pc-windows')
        run: |
          pip install dist/*.whl
          python -c "from syntaqlite import format_sql; assert 'SELECT' in format_sql('select 1')"

      - name: Upload wheel
        uses: actions/upload-artifact@v6
        with:
          name: wheel-${{ matrix.target }}-${{ matrix.python-tag || 'cli' }}
          path: dist/*.whl

  publish:
    name: Publish to PyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v7
        with:
          pattern: wheel-*
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
