# Build platform-specific Python wheels with the pre-built CLI binary
# and publish to PyPI on release tags.
#
# Waits for the Release workflow (cargo-dist) to complete, downloads
# CLI binaries from the GitHub Release, and packages them into wheels
# using python/dev/build_wheel.py (following the go-to-wheel pattern).
#
# Uses PyPI trusted publishing (OIDC) — no API token needed. Configure
# at https://pypi.org/manage/account/publishing/ with:
#   Owner: LalitMaganti
#   Repository: syntaqlite
#   Workflow: publish-pypi.yml
#   Environment: pypi
name: Publish PyPI

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

jobs:
  build-wheels:
    name: Build wheel (${{ matrix.target }})
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            archive: syntaqlite-macos-arm64.tar.gz
            binary: syntaqlite
          - target: x86_64-apple-darwin
            archive: syntaqlite-macos-x64.tar.gz
            binary: syntaqlite
          - target: x86_64-unknown-linux-gnu
            archive: syntaqlite-linux-x64.tar.gz
            binary: syntaqlite
          - target: aarch64-unknown-linux-gnu
            archive: syntaqlite-linux-arm64.tar.gz
            binary: syntaqlite
          - target: x86_64-pc-windows-msvc
            archive: syntaqlite-windows-x64.zip
            binary: syntaqlite.exe
          - target: aarch64-pc-windows-msvc
            archive: syntaqlite-windows-arm64.zip
            binary: syntaqlite.exe

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Get release tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the tag from the workflow run that triggered us
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          echo "tag=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Download binary from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download "${{ steps.tag.outputs.tag }}" --pattern "${{ matrix.archive }}" --dir tmp/

      - name: Extract binary
        run: |
          mkdir -p bin/
          ARCHIVE="tmp/${{ matrix.archive }}"
          if [[ "$ARCHIVE" == *.zip ]]; then
            unzip "$ARCHIVE" -d extracted/
          else
            tar -xf "$ARCHIVE" -C extracted/
          fi
          find extracted/ -name "${{ matrix.binary }}" -exec cp {} bin/ \;
          chmod +x bin/${{ matrix.binary }}

      - name: Build wheel
        run: |
          python python/dev/build_wheel.py \
            --binary bin/${{ matrix.binary }} \
            --platform ${{ matrix.target }} \
            --out dist/

      - name: Upload wheel
        uses: actions/upload-artifact@v6
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl

  publish:
    name: Publish to PyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v7
        with:
          pattern: wheel-*
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
