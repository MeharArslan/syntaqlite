[package]
name = "benches"
version = "0.1.0"
edition = "2024"
publish = false

[[bench]]
name = "main"
harness = false

[dependencies]
syntaqlite = { path = "../syntaqlite" }

[dev-dependencies]
criterion = "0.5"
syntaqlite-runtime = { path = "../syntaqlite-runtime", features = ["fmt"] }
syntaqlite-lsp = { path = "../syntaqlite-lsp" }
